
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>ResenhaBET Mobile Redesign</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              bg: '#06101f',
              surface: '#121822',
              border: '#232c3a',
              blue: '#3d8bfd',
              gold: '#e0b243',
              green: '#10b981',
              red: '#ef4444',
              text: '#ffffff',
              muted: '#64748b'
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Inter Tight', 'sans-serif']
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Inter+Tight:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #06101f;
      color: #f8fafc;
      -webkit-tap-highlight-color: transparent;
    }
    
    /* Hide scrollbar for clean UI */
    ::-webkit-scrollbar { display: none; }
    
    .pb-safe {
      padding-bottom: env(safe-area-inset-bottom, 16px);
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root" class="max-w-md mx-auto relative h-[100dvh] overflow-hidden border-x border-brand-border bg-brand-bg shadow-2xl"></div>

  <script type="text/babel">
    const { useState } = React;

    // --- Mock Data ---
    const MATCHES = [
      { id: 101, home: "Arsenal", away: "Chelsea", time: "15:00", status: "Upcoming", odds: { home: "2.10", draw: "3.40", away: "3.10" }, score: null, minute: null },
      { id: 102, home: "Man City", away: "Liverpool", time: "17:30", status: "Live", score: [1, 0], minute: "45'", odds: { home: "1.45", draw: "4.20", away: "6.50" } },
      { id: 103, home: "Real Madrid", away: "Barcelona", time: "Tomorrow", status: "Upcoming", odds: { home: "1.85", draw: "3.60", away: "4.00" }, score: null, minute: null },
      { id: 104, home: "Man Utd", away: "Tottenham", time: "Tomorrow", status: "Upcoming", odds: { home: "2.50", draw: "3.20", away: "2.80" }, score: null, minute: null },
      { id: 105, home: "Bayern Munich", away: "Dortmund", time: "Wed 20:00", status: "Upcoming", odds: { home: "1.30", draw: "5.50", away: "8.50" }, score: null, minute: null }
    ];

    // --- Icons ---
    const Icons = {
      Home: () => <svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
      Trophy: () => <svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8 21h8M12 17v4M7 4h10M4 4h16v5c0 3-2 5-6 6v2a2 2 0 0 1-4 0v-2c-4-1-6-3-6-6V4z"/></svg>,
      Wallet: () => <svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 7H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>,
      ChevronLeft: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 18l-6-6 6-6"/></svg>,
      ChevronDown: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9l6 6 6-6"/></svg>,
      MoreVertical: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
    };

    // --- Components ---
    const OddChip = ({ label, odd, active }) => (
      <button className={`flex flex-col items-center justify-center w-[44px] h-[44px] rounded border ${active ? 'bg-brand-green border-brand-green text-[#06140d]' : 'bg-brand-bg border-brand-border text-white'}`}>
        <span className={`text-[10px] ${active ? 'text-[#06140d]/70' : 'text-brand-muted'}`}>{label}</span>
        <span className="text-[13px] font-bold leading-none mt-0.5">{odd}</span>
      </button>
    );

    const MatchCard = ({ match, onClick }) => (
      <div className="flex items-stretch bg-brand-surface border-b border-brand-border cursor-pointer active:bg-brand-bg/50 transition-colors" onClick={onClick}>
        <div className="w-14 flex flex-col items-center justify-center border-r border-brand-border/50 py-2">
          {match.status === 'Live' ? (
             <>
               <span className="text-brand-green text-[9px] font-bold uppercase tracking-wider mb-0.5">Live</span>
               <span className="text-brand-green text-xs font-bold">{match.minute}</span>
             </>
          ) : (
             <span className="text-brand-muted text-xs font-semibold">{match.time}</span>
          )}
        </div>
        <div className="flex-1 flex flex-col justify-center px-3 py-3 gap-1.5">
          <div className="flex justify-between items-center leading-none">
            <span className={`text-[14px] font-semibold ${match.score && match.score[0] > match.score[1] ? 'text-white' : 'text-brand-muted'}`}>{match.home}</span>
            {match.score && <span className="font-bold text-sm">{match.score[0]}</span>}
          </div>
          <div className="flex justify-between items-center leading-none">
            <span className={`text-[14px] font-semibold ${match.score && match.score[1] > match.score[0] ? 'text-white' : 'text-brand-muted'}`}>{match.away}</span>
            {match.score && <span className="font-bold text-sm">{match.score[1]}</span>}
          </div>
        </div>
        <div className="flex items-center gap-1 pr-2 py-2" onClick={e => e.stopPropagation()}>
          <OddChip label="1" odd={match.odds.home} />
          <OddChip label="X" odd={match.odds.draw} />
          <OddChip label="2" odd={match.odds.away} />
        </div>
      </div>
    );

    const Dashboard = () => (
      <div className="bg-brand-bg flex-1 overflow-y-auto pb-24">
        <div className="flex justify-between items-center p-4 bg-brand-surface border-b border-brand-border sticky top-0 z-10">
          <div className="font-display font-black text-xl tracking-tight">Resenha<span className="text-brand-green">BET</span></div>
          <div className="w-8 h-8 rounded-full bg-brand-blue flex items-center justify-center font-bold text-sm">F</div>
        </div>
        
        <div className="p-4 border-b border-brand-border bg-brand-surface/40">
          <div className="flex justify-between items-center mb-3">
            <h2 className="font-bold text-sm text-white">My Tournaments</h2>
            <span className="text-brand-blue text-[11px] font-bold uppercase tracking-wider">View All</span>
          </div>
          <div className="flex gap-3 overflow-x-auto pb-2 -mx-4 px-4 snap-x">
            <div className="min-w-[220px] snap-center p-3.5 bg-brand-surface border border-brand-border rounded-lg shadow-lg relative overflow-hidden">
              <div className="absolute top-0 left-0 w-1 h-full bg-brand-gold"></div>
              <div className="text-xs text-brand-muted mb-1 font-medium">Champions League</div>
              <div className="font-bold text-[15px] mb-3 truncate text-white">The Boys 2026</div>
              <div className="flex justify-between items-end">
                 <div>
                   <div className="text-[10px] text-brand-muted font-medium mb-0.5">Balance</div>
                   <div className="font-bold text-brand-green text-sm tracking-tight">R$ 150.00</div>
                 </div>
                 <div className="text-xs font-bold text-brand-gold bg-brand-gold/10 px-2 py-1 rounded">Rank #2</div>
              </div>
            </div>
            <div className="min-w-[220px] snap-center p-3.5 bg-brand-surface border border-brand-border rounded-lg shadow-lg opacity-70">
              <div className="text-xs text-brand-muted mb-1 font-medium">Brasileirão</div>
              <div className="font-bold text-[15px] mb-3 truncate text-white">Work Group</div>
              <div className="flex justify-between items-end">
                 <div>
                   <div className="text-[10px] text-brand-muted font-medium mb-0.5">Balance</div>
                   <div className="font-bold text-white text-sm tracking-tight">R$ 0.00</div>
                 </div>
                 <div className="text-xs font-bold text-brand-muted bg-brand-bg px-2 py-1 rounded">Rank #8</div>
              </div>
            </div>
          </div>
        </div>

        <div className="p-4">
          <h2 className="font-bold text-sm mb-3 text-white">Active Bets</h2>
          <div className="flex flex-col gap-2">
            <div className="bg-brand-surface border border-brand-border rounded-md p-3.5 relative overflow-hidden shadow-sm">
              <div className="absolute left-0 top-0 bottom-0 w-1 bg-brand-blue"></div>
              <div className="flex justify-between items-start mb-1.5">
                <span className="font-bold text-[14px] text-white">Over 2.5 Goals</span>
                <span className="font-mono font-bold text-sm text-white">1.85</span>
              </div>
              <div className="text-xs text-brand-muted mb-3 font-medium">Man City vs Liverpool</div>
              <div className="flex justify-between text-[11px] border-t border-brand-border/50 pt-2.5 font-medium">
                <span className="text-brand-muted">Stake: R$ 50.00</span>
                <span className="font-bold text-brand-green">To return: R$ 92.50</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    );

    const Ranking = () => {
      const users = [
        { rank: 1, name: "Thiago Silva", pts: 450, form: ['W','W','W','D'] },
        { rank: 2, name: "Lucas Moura", pts: 320, form: ['W','L','W','W'] },
        { rank: 3, name: "You (Francis)", pts: 290, form: ['W','L','L','W'] },
        { rank: 4, name: "Pedro", pts: 210, form: ['L','L','D','D'] },
        { rank: 5, name: "Gabriel", pts: 180, form: ['D','L','L','L'] },
        { rank: 6, name: "João", pts: 150, form: ['L','L','D','W'] }
      ];
      return (
        <div className="animate-in fade-in duration-200 pb-24">
          <div className="flex px-4 py-2.5 text-[10px] font-bold text-brand-muted uppercase tracking-wider border-b border-brand-border bg-brand-bg sticky top-0 z-10">
            <div className="w-8">#</div>
            <div className="flex-1">Player</div>
            <div className="w-24 text-right">Form</div>
            <div className="w-14 text-right">Pts</div>
          </div>
          {users.map(u => (
            <div key={u.rank} className={`flex items-center px-4 py-3 border-b border-brand-border ${u.name.includes('You') ? 'bg-brand-blue/10' : 'bg-brand-surface'}`}>
              <div className={`w-8 font-bold text-sm ${u.rank === 1 ? 'text-brand-gold' : 'text-brand-muted'}`}>
                {u.rank}
              </div>
              <div className="flex-1 font-semibold text-sm truncate text-white">{u.name}</div>
              <div className="w-24 flex justify-end gap-1">
                {u.form.map((f, i) => (
                  <span key={i} className={`w-4 h-4 flex items-center justify-center rounded-[2px] text-[9px] font-bold ${f === 'W' ? 'bg-brand-green text-[#06140d]' : f === 'L' ? 'bg-brand-red text-white' : 'bg-[#475569] text-white'}`}>
                    {f}
                  </span>
                ))}
              </div>
              <div className="w-14 text-right font-mono font-bold text-[15px] text-white tracking-tight">{u.pts}</div>
            </div>
          ))}
        </div>
      )
    };

    const Tournament = ({ tab, setTab, onSelectMatch }) => (
      <div className="flex flex-col h-full bg-brand-bg">
        <div className="px-4 pt-4 pb-3 bg-brand-surface border-b border-brand-border sticky top-0 z-20">
          <div className="flex items-start justify-between mb-3">
            <div>
              <h1 className="font-display font-bold text-xl leading-tight text-white mb-0.5">Champions League</h1>
              <div className="text-xs text-brand-muted font-medium">Group Stage • Week 4</div>
            </div>
            <button className="p-1 -mr-1 text-brand-muted hover:text-white transition-colors">
              <Icons.MoreVertical />
            </button>
          </div>
          
          <div className="flex gap-5">
            <button 
              onClick={() => setTab('matches')}
              className={`pb-2 text-sm font-semibold transition-colors relative ${tab === 'matches' ? 'text-white' : 'text-brand-muted'}`}
            >
              Matches
              {tab === 'matches' && <div className="absolute bottom-[-13px] left-0 right-0 h-0.5 bg-brand-blue rounded-t"></div>}
            </button>
            <button 
              onClick={() => setTab('ranking')}
              className={`pb-2 text-sm font-semibold transition-colors relative ${tab === 'ranking' ? 'text-white' : 'text-brand-muted'}`}
            >
              Standings
              {tab === 'ranking' && <div className="absolute bottom-[-13px] left-0 right-0 h-0.5 bg-brand-blue rounded-t"></div>}
            </button>
          </div>
        </div>

        <div className="flex-1 overflow-y-auto">
          {tab === 'matches' && (
            <div className="animate-in fade-in duration-200 pb-24">
              <div className="px-4 py-2 text-[10px] font-bold text-brand-muted uppercase tracking-wider bg-brand-bg border-b border-brand-border sticky top-0 z-10">
                Today
              </div>
              {MATCHES.slice(0,2).map(m => <MatchCard key={m.id} match={m} onClick={() => onSelectMatch(m)} />)}
              
              <div className="px-4 py-2 text-[10px] font-bold text-brand-muted uppercase tracking-wider bg-brand-bg border-y border-brand-border sticky top-0 z-10 mt-2">
                Tomorrow
              </div>
              {MATCHES.slice(2).map(m => <MatchCard key={m.id} match={m} onClick={() => onSelectMatch(m)} />)}
            </div>
          )}
          {tab === 'ranking' && <Ranking />}
        </div>
      </div>
    );

    const MarketGroup = ({ title, children, open: initialOpen }) => {
      const [open, setOpen] = useState(initialOpen);
      return (
        <div className="border-b border-brand-border bg-brand-bg">
          <button onClick={() => setOpen(!open)} className="w-full flex justify-between items-center px-4 py-3 bg-brand-surface/70 active:bg-brand-surface transition-colors">
            <span className="font-bold text-[13px] text-white">{title}</span>
            <div className={`text-brand-muted transform transition-transform duration-200 ${open ? 'rotate-180' : ''}`}>
              <Icons.ChevronDown />
            </div>
          </button>
          <div className={`overflow-hidden transition-all duration-300 ${open ? 'max-h-96 opacity-100' : 'max-h-0 opacity-0'}`}>
            <div className="p-3 bg-brand-bg">{children}</div>
          </div>
        </div>
      );
    };

    const MarketChip = ({ label, odd, active }) => (
      <button className={`flex items-center justify-between px-3 py-3 rounded border transition-colors ${active ? 'bg-brand-green border-brand-green text-[#06140d]' : 'bg-brand-surface border-brand-border text-white active:bg-brand-surface/50'}`}>
        <span className={`text-[11px] ${active ? 'text-[#06140d]/80 font-bold' : 'text-brand-muted font-medium'}`}>{label}</span>
        <span className="text-[14px] font-bold tracking-tight">{odd}</span>
      </button>
    );

    const MatchDetails = ({ match, onBack }) => (
      <div className="flex flex-col h-[100dvh] bg-brand-bg text-brand-text absolute inset-0 z-50 animate-in slide-in-from-right-full duration-300">
        <div className="flex items-center justify-between px-2 py-3 bg-brand-surface border-b border-brand-border relative z-20">
          <button onClick={onBack} className="p-2 text-brand-blue flex items-center gap-1 active:opacity-70">
            <Icons.ChevronLeft />
            <span className="text-[15px] font-semibold tracking-tight -ml-1">Back</span>
          </button>
          <div className="absolute left-1/2 -translate-x-1/2 font-display font-bold text-[15px] text-white">Matches</div>
          <button className="p-2 text-brand-muted">
            <Icons.MoreVertical />
          </button>
        </div>

        <div className="flex-1 overflow-y-auto pb-[100px]">
          <div className="px-4 py-5 bg-brand-surface border-b border-brand-border flex flex-col items-center">
             <div className="text-[11px] uppercase tracking-wider text-brand-green font-bold mb-3">
               {match.status === 'Live' ? `Live • ${match.minute}` : match.time}
             </div>
             <div className="flex w-full items-center justify-between">
               <div className="flex-1 text-right text-[17px] font-bold text-white leading-tight">{match.home}</div>
               <div className="px-5 text-3xl font-display font-black tracking-wider text-white">
                 {match.score ? match.score.join(' - ') : 'v'}
               </div>
               <div className="flex-1 text-left text-[17px] font-bold text-brand-muted leading-tight">{match.away}</div>
             </div>
          </div>

          <div className="flex gap-5 px-4 pt-3 pb-0 border-b border-brand-border bg-brand-surface overflow-x-auto whitespace-nowrap">
            <button className="text-[13px] font-bold text-brand-blue border-b-2 border-brand-blue pb-2.5 px-1">All Markets</button>
            <button className="text-[13px] font-semibold text-brand-muted pb-2.5 px-1">Main</button>
            <button className="text-[13px] font-semibold text-brand-muted pb-2.5 px-1">Goals</button>
            <button className="text-[13px] font-semibold text-brand-muted pb-2.5 px-1">Halves</button>
          </div>

          <MarketGroup title="Match Result (1X2)" open={true}>
            <div className="grid grid-cols-3 gap-2">
               <MarketChip label={match.home} odd={match.odds.home} />
               <MarketChip label="Draw" odd={match.odds.draw} />
               <MarketChip label={match.away} odd={match.odds.away} />
            </div>
          </MarketGroup>

          <MarketGroup title="Total Goals (2.5)" open={true}>
            <div className="grid grid-cols-2 gap-2">
               <MarketChip label="Over 2.5" odd="1.85" />
               <MarketChip label="Under 2.5" odd="1.95" active />
            </div>
          </MarketGroup>
          
          <MarketGroup title="Both Teams to Score" open={false}>
            <div className="grid grid-cols-2 gap-2">
               <MarketChip label="Yes" odd="1.70" />
               <MarketChip label="No" odd="2.10" />
            </div>
          </MarketGroup>
        </div>

        <div className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-brand-surface border-t border-brand-border p-4 shadow-[0_-10px_30px_rgba(0,0,0,0.5)] z-30 pb-safe">
           <div className="flex justify-between items-center mb-3">
             <span className="text-[13px] text-brand-muted font-medium">1 selection</span>
             <span className="font-bold text-[14px] text-white">Total Odds: <span className="text-brand-green ml-1">1.95</span></span>
           </div>
           <button className="w-full bg-brand-green text-[#06140d] font-bold py-3.5 rounded-[8px] text-[15px] active:scale-[0.98] transition-transform shadow-lg shadow-brand-green/20">
             Place Bet
           </button>
        </div>
      </div>
    );

    const Wallet = () => {
      const txs = [
        { id: 1, title: 'Bet Won: Real Madrid vs Barca', date: 'Today, 14:30', amount: '+ 45.00', type: 'win' },
        { id: 2, title: 'Bet Placed: Arsenal vs Chelsea', date: 'Today, 10:00', amount: '- 10.00', type: 'bet' },
        { id: 3, title: 'Deposit via PIX', date: 'Yesterday', amount: '+ 100.00', type: 'deposit' },
        { id: 4, title: 'Bet Placed: Bayern vs Dortmund', date: 'Yesterday', amount: '- 25.00', type: 'bet' },
      ];
      return (
        <div className="flex flex-col h-full bg-brand-bg overflow-y-auto pb-24">
          <div className="px-6 pt-10 pb-8 bg-brand-surface border-b border-brand-border flex flex-col items-center shadow-sm">
            <div className="text-[13px] font-semibold text-brand-muted mb-1.5">Total Balance</div>
            <div className="text-[40px] font-display font-black text-white mb-6 tracking-tight">
              R$ <span className="text-brand-green">1,250</span>.00
            </div>
            <div className="flex gap-3 w-full max-w-[280px]">
              <button className="flex-1 bg-brand-blue text-white py-3 rounded-[6px] text-[14px] font-bold shadow-lg shadow-brand-blue/20 active:scale-95 transition-transform">Deposit</button>
              <button className="flex-1 bg-brand-bg border border-brand-border text-white py-3 rounded-[6px] text-[14px] font-bold active:scale-95 transition-transform">Withdraw</button>
            </div>
          </div>
          
          <div className="px-4 py-2.5 text-[10px] font-bold text-brand-muted uppercase tracking-wider bg-brand-bg border-b border-brand-border sticky top-0">
            Recent Activity
          </div>
          <div className="flex-1">
            {txs.map(tx => (
              <div key={tx.id} className="flex items-center justify-between px-4 py-3.5 bg-brand-surface border-b border-brand-border">
                <div className="flex flex-col gap-1">
                  <span className="text-[14px] font-semibold text-white leading-tight">{tx.title}</span>
                  <span className="text-[11px] font-medium text-brand-muted">{tx.date}</span>
                </div>
                <div className={`text-[15px] font-bold font-mono tracking-tight ${tx.type === 'win' || tx.type === 'deposit' ? 'text-brand-green' : 'text-white'}`}>
                  {tx.amount}
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    };

    const BottomNav = ({ active, onChange }) => {
      const items = [
        { id: 'dashboard', label: 'Home', icon: <Icons.Home /> },
        { id: 'tournament', label: 'Tournament', icon: <Icons.Trophy /> },
        { id: 'wallet', label: 'Wallet', icon: <Icons.Wallet /> }
      ];
      return (
        <div className="absolute bottom-0 left-0 right-0 bg-brand-surface border-t border-brand-border flex items-center justify-around h-[64px] pb-safe z-40 shadow-[0_-4px_20px_rgba(0,0,0,0.3)]">
          {items.map(i => (
            <button key={i.id} onClick={() => onChange(i.id)} className={`flex flex-col items-center justify-center w-full h-full gap-1 pt-1 ${active === i.id ? 'text-brand-blue' : 'text-brand-muted hover:text-white transition-colors'}`}>
              {i.icon}
              <span className="text-[10px] font-bold tracking-wide">{i.label}</span>
            </button>
          ))}
        </div>
      );
    };

    const App = () => {
      const [activeTab, setActiveTab] = useState('tournament');
      const [activeMatch, setActiveMatch] = useState(null);
      const [tourneyTab, setTourneyTab] = useState('matches');

      return (
        <div className="flex flex-col h-[100dvh] relative bg-brand-bg">
          <div className="flex-1 overflow-hidden relative">
            {activeTab === 'dashboard' && <Dashboard />}
            {activeTab === 'tournament' && (
               <Tournament tab={tourneyTab} setTab={setTourneyTab} onSelectMatch={setActiveMatch} />
            )}
            {activeTab === 'wallet' && <Wallet />}
          </div>
          
          <BottomNav active={activeTab} onChange={setActiveTab} />

          {activeMatch && <MatchDetails match={activeMatch} onBack={() => setActiveMatch(null)} />}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
