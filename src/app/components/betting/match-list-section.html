<section class="space-y-3">
  <div
    class="flex items-center justify-between gap-4 border-b border-[var(--brand-border)] bg-[var(--surface-1)] px-4 py-2"
    [class.sticky]="sticky"
    [class.top-0]="sticky"
    [class.z-10]="sticky"
  >
    <div class="min-w-0">
      <h3 class="text-[10px] font-bold uppercase tracking-[0.08em] text-[var(--brand-muted)]">
        {{ title }}
      </h3>
      @if (subtitle) {
        <p class="mt-0.5 text-xs text-[var(--brand-muted)]">{{ subtitle }}</p>
      }
    </div>

    <ng-content select="[trailing]"></ng-content>
  </div>

  <div class="space-y-0">
    <ng-content></ng-content>
  </div>
</section>
