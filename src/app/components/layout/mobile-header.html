<header class="sticky top-0 z-40 border-b border-[var(--brand-border)] bg-[var(--surface-2)]/95 backdrop-blur">
  <div class="flex h-14 items-center justify-between gap-3 px-4 sm:h-16 sm:px-6 md:px-8">
    <a routerLink="/" class="flex min-w-0 items-center gap-2">
      <span class="font-display text-lg font-black tracking-tight text-white sm:text-xl">
        Resenha<span class="text-[var(--brand-green)]">BET</span>
      </span>
    </a>

    <div class="flex min-w-0 items-center gap-2 sm:gap-3">
      <app-active-group-switcher class="max-w-[160px] sm:max-w-[220px]" />

      <button
        type="button"
        class="inline-flex h-10 items-center justify-center rounded-full border border-[var(--brand-border)] bg-[var(--surface-1)] px-3 text-sm font-semibold text-gray-200 transition hover:bg-[var(--surface-2)]"
        (click)="logout.emit()"
      >
        Sair
      </button>
    </div>
  </div>
</header>
