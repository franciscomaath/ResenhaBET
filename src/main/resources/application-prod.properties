spring.application.name=resenhaapi
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.driver-class-name=org.postgresql.Driver
spring.config.import=optional:file:.env[.properties]

spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.url=jdbc:postgresql://${DB_URL}:${DB_PORT}/${DB_NAME}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.flyway.default-schema=${SPRING_FLYWAY_DEFAULT_SCHEMA:resenha}
spring.flyway.target=${SPRING_FLYWAY_TARGET:latest}
spring.jpa.properties.hibernate.default_schema=${SPRING_FLYWAY_DEFAULT_SCHEMA:resenha}

resenhabet.admin.name=${ADMIN_NAME:Francisco}

resenhabet.odds.elo-scale=${ODDS_ELO_SCALE:400}
resenhabet.odds.draw-factor=${ODDS_DRAW_FACTOR:0.28}
resenhabet.odds.max-h2h-weight=${ODDS_MAX_H2H_WEIGHT:0.20}
resenhabet.odds.min-odd=${ODDS_MIN_ODD:1.05}
resenhabet.odds.h2h-match-limit=${ODDS_H2H_MATCH_LIMIT:10}
resenhabet.odds.avg-goals-per-side=${ODDS_AVG_GOALS_PER_SIDE:2.5}
resenhabet.odds.elo-lambda-alpha=${ODDS_ELO_LAMBDA_ALPHA:0.40}
resenhabet.odds.hist-lambda-threshold=${ODDS_HIST_LAMBDA_THRESHOLD:10}
resenhabet.odds.max-hist-lambda-weight=${ODDS_MAX_HIST_LAMBDA_WEIGHT:0.40}
resenhabet.odds.exact-score-top-n=${ODDS_EXACT_SCORE_TOP_N:8}

resenhabet.apifootball.key=${API_FOOTBALL_KEY}
resenhabet.apifootball.base-url=${API_FOOTBALL_BASE_URL}
resenhabet.apifootball.connect-timeout-ms=3000
resenhabet.apifootball.read-timeout-ms=10000

resenhabet.gameforecast.rapidapi-key=${RAPIDAPI_KEY}
resenhabet.gameforecast.base-url=${GAMEFORECAST_BASE_URL}
resenhabet.gameforecast.min-exact-score-probability=2
resenhabet.gameforecast.connect-timeout-ms=3000
resenhabet.gameforecast.read-timeout-ms=10000

resenhabet.external-api.replay-mode=${EXTERNAL_API_REPLAY_MODE:false}

resenhabet.scheduler.live-poll-enabled=${SCHEDULER_LIVE_POLL_ENABLED:true}
resenhabet.scheduler.live-poll-fixed-delay-ms=180000
resenhabet.scheduler.auto-close-grace-minutes=0
resenhabet.scheduler.finish-fallback-after-minutes=180
